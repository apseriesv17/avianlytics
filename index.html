<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F6E56">
<link rel="apple-touch-icon" href="icon-512.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avianlytics - Poultry Trial App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --primary: #0F6E56;
    --primary-hover: #0a4f3e;
    --danger: #dc2626;
    --danger-hover: #b91c1c;
    --bg-main: #f4f7f6;
    --bg-card: #ffffff;
    --text-main: #1f2937;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --radius: 8px;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  }
  body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 2rem; line-height: 1.5; }
  .container { max-width: 1000px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { margin: 0; color: var(--primary); font-size: 2.5rem; }
  .active-exp-badge { display: inline-block; background: #eef2ff; color: #4f46e5; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-top: 10px; }
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; overflow-x: auto; }
  .tab-btn { background: transparent; border: none; padding: 0.75rem 1.25rem; font-size: 1rem; font-weight: 500; color: var(--text-muted); cursor: pointer; border-radius: var(--radius); }
  .tab-btn.active { background: var(--primary); color: white; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  input, select { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; }
  button.primary-btn { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; cursor: pointer; width: 100%; }
  .table-wrapper { overflow-x: auto; max-height: 300px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Avianlytics</h1>
    <div id="headerActiveExp" class="active-exp-badge"><i class="ti ti-folder"></i> Active: Experiment 1</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('guide')">Guide</button>
    <button class="tab-btn" onclick="switchTab('setup')">Trial Setup</button>
    <button class="tab-btn" onclick="switchTab('entry')">Data Entry</button>
    <button class="tab-btn" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab-btn" onclick="switchTab('anova')">ANOVA</button>
  </div>

  <div id="guide" class="tab-content active card"><h2>How to Use</h2><p>1. Set up Trial. 2. Enter Daily Feed. 3. Enter Weekly BW/Residual. 4. Analyze.</p></div>
  <div id="setup" class="tab-content card">
    <h3>Experiment Manager</h3>
    <select id="expSelectDropdown"></select>
    <div class="grid-2" style="margin-top:1rem;">
      <input id="numGroups" type="number" placeholder="Groups (Pens)" />
      <input id="numWeeks" type="number" placeholder="Duration (Weeks)" />
      <input id="numTreatments" type="number" placeholder="Treatments" />
      <input id="numReplicates" type="number" placeholder="Replicates" />
    </div>
    <button id="saveConfigBtn" class="primary-btn" style="margin-top:1rem;">Save Configuration</button>
    <p id="mappingNote"></p>
  </div>
  <div id="entry" class="tab-content card">
    <div class="grid-2">
      <div><label>Group</label><select id="groupD"></select></div>
      <div><label>Group (Weekly)</label><select id="group"></select></div>
    </div>
    <button id="addDailyBtn" class="primary-btn">Save Daily</button>
    <button id="addWeeklyBtn" class="primary-btn">Save Weekly</button>
  </div>
  <div id="dashboard" class="tab-content card"><canvas id="bwChart"></canvas></div>
  <div id="anova" class="tab-content card"><button id="runAnovaBtn" class="primary-btn">Run Analysis</button></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script>

<script>
let NUM_GROUPS = 100, NUM_WEEKS = 6, NUM_TREATMENTS = 4, REPS_PER_TREATMENT = 25;
let currentExpName = "Experiment 1", experiments = {}, weeklyRecords = [], dailyRecords = [];

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`button[onclick="switchTab('${tabId}')"]`).classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

function mappingValid() { return (NUM_TREATMENTS * REPS_PER_TREATMENT === NUM_GROUPS); }

function populateDropdowns() {
  const selects = [document.getElementById('group'), document.getElementById('groupD')];
  selects.forEach(sel => {
    if (!sel) return;
    const prev = sel.value;
    sel.innerHTML = '';
    for(let g=1; g<=NUM_GROUPS; g++){
      let opt = document.createElement('option');
      opt.value = g;
      opt.textContent = mappingValid() ? `Group ${g} (T${Math.ceil(g/REPS_PER_TREATMENT)})` : `Group ${g}`;
      sel.appendChild(opt);
    }
    if(prev) sel.value = prev;
  });
}

function loadState() {
  const saved = localStorage.getItem('avianlytics_workspace_v2');
  if (saved) {
    const state = JSON.parse(saved);
    experiments = state.experiments || {};
    currentExpName = state.currentExpName || "Experiment 1";
    const data = experiments[currentExpName] || {};
    NUM_GROUPS = data.NUM_GROUPS || 100;
    NUM_WEEKS = data.NUM_WEEKS || 6;
  }
  populateDropdowns();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('saveConfigBtn').addEventListener('click', () => {
    NUM_GROUPS = parseInt(document.getElementById('numGroups').value) || 100;
    populateDropdowns();
    alert("Configuration updated!");
  });
  
  loadState();
});
</script>
</body>
</html>
