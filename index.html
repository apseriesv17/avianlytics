<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F6E56">
<link rel="apple-touch-icon" href="icon-512.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avianlytics - Poultry Trial App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --primary: #0F6E56;
    --primary-hover: #0a4f3e;
    --danger: #dc2626;
    --danger-hover: #b91c1c;
    --bg-main: #f4f7f6;
    --bg-card: #ffffff;
    --text-main: #1f2937;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --radius: 8px;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  }
  body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 2rem; line-height: 1.5; }
  .container { max-width: 1000px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; position: relative; }
  .header h1 { margin: 0; color: var(--primary); font-size: 2.5rem; letter-spacing: -0.5px; }
  .active-exp-badge { display: inline-block; background: #eef2ff; color: #4f46e5; border: 1px solid #c7d2fe; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-top: 10px; }
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; overflow-x: auto; }
  .tab-btn { background: transparent; border: none; padding: 0.75rem 1.25rem; font-size: 1rem; font-weight: 500; color: var(--text-muted); cursor: pointer; border-radius: var(--radius); transition: all 0.2s; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .tab-btn.active { background: var(--primary); color: white; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.25rem; color: var(--text-muted); }
  input, select { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px; font-family: inherit; }
  button.primary-btn { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 500; border-radius: 4px; cursor: pointer; width: 100%; }
  button.secondary-btn { background: white; color: var(--primary); border: 1px solid var(--primary); padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 500; border-radius: 4px; cursor: pointer; width: 100%; }
  button.danger-btn { background: var(--danger); color: white; border: none; padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 500; border-radius: 4px; cursor: pointer; }
  .table-wrapper { overflow-x: auto; max-height: 300px; border: 1px solid var(--border); border-radius: var(--radius); }
  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Avianlytics</h1>
    <div id="headerActiveExp" class="active-exp-badge"><i class="ti ti-folder"></i> Active: Experiment 1</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('guide')"><i class="ti ti-book"></i> Guide</button>
    <button class="tab-btn" onclick="switchTab('setup')"><i class="ti ti-settings"></i> Trial Setup</button>
    <button class="tab-btn" onclick="switchTab('entry')"><i class="ti ti-pencil"></i> Data Entry</button>
    <button class="tab-btn" onclick="switchTab('dashboard')"><i class="ti ti-layout-dashboard"></i> Dashboard</button>
    <button class="tab-btn" onclick="switchTab('anova')"><i class="ti ti-calculator"></i> ANOVA Analysis</button>
  </div>

  <div id="guide" class="tab-content active card"><h2>Guide</h2>...</div>
  <div id="setup" class="tab-content card">
    <label>Select Experiment</label><select id="expSelectDropdown"></select>
    <input id="newExpNameInput" type="text" placeholder="New Experiment Name">
    <button id="createExpBtn" class="secondary-btn">Create</button>
    <button id="saveConfigBtn" class="primary-btn">Save Configuration</button>
  </div>
  <div id="entry" class="tab-content card">
    <label>Group</label><select id="group"></select>
    </div>
  <div id="dashboard" class="tab-content card">
    <canvas id="bwChart"></canvas>
    <button id="exportBtn" class="primary-btn">Export Active Experiment</button>
  </div>
  <div id="anova" class="tab-content card">...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script>

<script>
  // --- CORE DATA ARCHITECTURE ---
  const STORAGE_KEY = 'avianlytics_workspace_v2';
  let currentExpName = "Experiment 1";
  let experiments = {};
  let NUM_GROUPS = 100, NUM_WEEKS = 6, NUM_TREATMENTS = 4, REPS_PER_TREATMENT = 25;
  let weeklyRecords = [], dailyRecords = [];

  // --- BOOT UP ---
  window.addEventListener('DOMContentLoaded', () => { loadState(); });

  function loadState() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const state = JSON.parse(saved);
      experiments = state.experiments || {};
      currentExpName = state.currentExpName || "Experiment 1";
    }
    loadActiveFromMemory(currentExpName);
    updateExpUI();
  }

  function loadActiveFromMemory(name) {
    currentExpName = name;
    if (!experiments[name]) {
      experiments[name] = { NUM_GROUPS: 100, NUM_WEEKS: 6, NUM_TREATMENTS: 4, REPS_PER_TREATMENT: 25, weeklyRecords: [], dailyRecords: [] };
    }
    const data = experiments[name];
    NUM_GROUPS = data.NUM_GROUPS; NUM_WEEKS = data.NUM_WEEKS;
    NUM_TREATMENTS = data.NUM_TREATMENTS; REPS_PER_TREATMENT = data.REPS_PER_TREATMENT;
    weeklyRecords = data.weeklyRecords; dailyRecords = data.dailyRecords;
    populateAllDropdowns();
  }

  function saveState() {
    experiments[currentExpName] = { NUM_GROUPS, NUM_WEEKS, NUM_TREATMENTS, REPS_PER_TREATMENT, weeklyRecords, dailyRecords };
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ currentExpName, experiments }));
  }

  function populateAllDropdowns() {
    const groupSel = document.getElementById('group');
    const groupSelD = document.getElementById('groupD');
    [groupSel, groupSelD].forEach(sel => {
        if(!sel) return;
        sel.innerHTML = '';
        for(let g=1; g<=NUM_GROUPS; g++){
            let opt = document.createElement('option');
            opt.value = g; opt.textContent = `Group ${g}`;
            sel.appendChild(opt);
        }
    });
  }

  function updateExpUI() {
    document.getElementById('headerActiveExp').innerHTML = `<i class="ti ti-folder"></i> Active: ${currentExpName}`;
    const sel = document.getElementById('expSelectDropdown');
    sel.innerHTML = '';
    Object.keys(experiments).forEach(exp => {
      let opt = document.createElement('option');
      opt.value = exp; opt.textContent = exp;
      if(exp === currentExpName) opt.selected = true;
      sel.appendChild(opt);
    });
    document.getElementById('numGroups').value = NUM_GROUPS;
    document.getElementById('numWeeks').value = NUM_WEEKS;
    document.getElementById('numTreatments').value = NUM_TREATMENTS;
    document.getElementById('numReplicates').value = REPS_PER_TREATMENT;
  }
  
  // (Include previous switchTab, exportBtn, ANOVA logic here)
  // --- UI TAB LOGIC ---
function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
  document.querySelector(`button[onclick="switchTab('${tabId}')"]`).classList.add('active');
  document.getElementById(tabId).classList.add('active');
  if(tabId === 'dashboard') refresh();
}

// --- ANOVA LOGIC ---
document.getElementById('runAnovaBtn').addEventListener('click', () => {
  if(!mappingValid()) return alert("Ensure Trial Setup mapping is valid.");
  
  const param = document.getElementById('anovaParam').value;
  const period = document.getElementById('anovaPeriod').value;
  
  let startW = 1, endW = NUM_WEEKS;
  if(period.startsWith('w')) { startW = endW = Number(period.replace('w','')); }
  else if(period === 'pre') { startW = 1; endW = 2; }
  else if(period === 'star') { startW = 3; endW = 4; }
  else if(period === 'fin') { startW = 5; endW = 6; }
  
  const groupsData = []; 
  for(let t=1; t<=NUM_TREATMENTS; t++) groupsData.push([]);

  for(let g=1; g<=NUM_GROUPS; g++) {
    const t = treatmentOf(g);
    let repFi = 0, startBw = 0, endBw = 0;
    
    for(let w=startW; w<=endW; w++){
      const rec = weeklyRecords.find(r => r.group === g && r.week === w);
      if(rec) {
        repFi += Math.max(feedOfferedForGroupWeek(g, w) - rec.rfi, 0);
        endBw = rec.bw; 
      }
      if(w === startW && startW > 1) {
        const prevRec = weeklyRecords.find(r => r.group === g && r.week === (startW - 1));
        if(prevRec) startBw = prevRec.bw;
      }
    }
    
    let val = null;
    if(param === 'bw' && endBw > 0) val = endBw;
    if(param === 'fi' && repFi > 0) val = repFi;
    if(param === 'fcr' && endBw > startBw) val = repFi / (endBw - startBw);

    if(val !== null) groupsData[t-1].push(val);
  }

  const validGroups = groupsData.filter(g => g.length > 0);
  if(validGroups.length < 2) return alert("Not enough data points to run ANOVA across treatments for this period.");

  let totalN = 0, grandSum = 0;
  validGroups.forEach(g => { totalN += g.length; grandSum += jStat.sum(g); });
  const grandMean = grandSum / totalN;

  let ssBetween = 0, ssWithin = 0;
  validGroups.forEach(g => {
      const groupMean = jStat.mean(g);
      ssBetween += g.length * Math.pow(groupMean - grandMean, 2);
      g.forEach(val => { ssWithin += Math.pow(val - groupMean, 2); });
  });

  const dfBetween = validGroups.length - 1;
  const dfWithin = totalN - validGroups.length;
  
  if(dfWithin <= 0) return alert("Need more replicates to calculate variance.");

  const msBetween = ssBetween / dfBetween;
  const msWithin = ssWithin / dfWithin;
  const fStat = msBetween / msWithin;
  
  const pValue = 1 - jStat.centralF.cdf(fStat, dfBetween, dfWithin);

  document.getElementById('anovaResult').style.display = 'block';
  document.getElementById('anovaTableBody').innerHTML = `
    <tr><td>Between Treatments</td><td>${ssBetween.toFixed(2)}</td><td>${dfBetween}</td><td>${msBetween.toFixed(2)}</td><td><b>${fStat.toFixed(3)}</b></td><td><b>${pValue < 0.001 ? '<0.001' : pValue.toFixed(4)}</b></td></tr>
    <tr><td>Within (Error)</td><td>${ssWithin.toFixed(2)}</td><td>${dfWithin}</td><td>${msWithin.toFixed(2)}</td><td></td><td></td></tr>
    <tr><td>Total</td><td>${(ssBetween+ssWithin).toFixed(2)}</td><td>${dfBetween+dfWithin}</td><td></td><td></td><td></td></tr>
  `;

  const interp = document.getElementById('anovaInterpretation');
  if(pValue < 0.05) {
    interp.innerHTML = `<span style="color:#0F6E56">Result: Significant difference found</span> between treatments for ${param.toUpperCase()} during this phase (p < 0.05).`;
  } else {
    interp.innerHTML = `<span style="color:#854F0B">Result: No significant difference</span> between treatments for ${param.toUpperCase()} during this phase (p >= 0.05).`;
  }
});

// -- EXCEL --
document.getElementById('exportBtn').addEventListener('click', () => {
  const weeklyData = weeklyRecords.slice().sort((a,b)=> a.group - b.group || a.week - b.week).map(r=>{
    const offered = feedOfferedForGroupWeek(r.group, r.week);
    const t = treatmentOf(r.group);
    const rep = replicateOf(r.group);
    const row = { Group: r.group };
    if(mappingValid()){ row.Treatment = 'T'+t; row.Replicate = 'R'+rep; }
    row.Week = r.week;
    row['Body Weight (g)'] = r.bw;
    row['Feed Offered (g)'] = offered;
    row['Residual Feed (g)'] = r.rfi;
    row['Feed Intake (g)'] = Math.max(offered - r.rfi, 0);
    return row;
  });
  const dailyData = dailyRecords.slice().sort((a,b)=> a.group - b.group || a.day - b.day).map(r=>{
    const t = treatmentOf(r.group);
    const rep = replicateOf(r.group);
    const row = { Group: r.group };
    if(mappingValid()){ row.Treatment = 'T'+t; row.Replicate = 'R'+rep; }
    row.Day = r.day;
    row['Feed Offered (g)'] = r.dfo;
    return row;
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(weeklyData), 'Weekly Data');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dailyData), 'Daily Feed Offered');

  if(mappingValid()){
    const summaryRows = [];
    const prevAvgBw = {};
    for(let w=1; w<=NUM_WEEKS; w++){
      for(let t=1; t<=NUM_TREATMENTS; t++){
        const recordsThisWeek = weeklyRecords.filter(r => treatmentOf(r.group) === t && r.week === w);
        if(!recordsThisWeek.length) continue;
        let sumBw = 0, sumFi = 0;
        recordsThisWeek.forEach(r => {
          sumBw += r.bw;
          sumFi += Math.max(feedOfferedForGroupWeek(r.group, r.week) - r.rfi, 0);
        });
        const avgBw = sumBw / recordsThisWeek.length;
        const avgFi = sumFi / recordsThisWeek.length;
        const gain = avgBw - (prevAvgBw[t] || 0);
        const fcr = gain > 0 ? (avgFi / gain) : null;
        summaryRows.push({
          Treatment: 'T'+t,
          Week: w,
          'Avg Body Weight (g)': avgBw.toFixed(1),
          'Avg Feed Intake (g)': avgFi.toFixed(1),
          'Avg Weight Gain (g)': gain.toFixed(1),
          FCR: fcr ? fcr.toFixed(2) : 'NA'
        });
        prevAvgBw[t] = avgBw;
      }
    }
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summaryRows), 'Treatment Summary');
  }

  const safeName = currentExpName.replace(/[^a-z0-9]/gi, '_').toLowerCase();
  XLSX.writeFile(wb, `Avianlytics_${safeName}_data.xlsx`);
});
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker registered!'))
        .catch(err => console.log('SW failed.', err));
    });
  }
</script>
</body>
</html>
