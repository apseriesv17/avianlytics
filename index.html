<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F6E56">
<link rel="apple-touch-icon" href="icon-512.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avianlytics - Poultry Trial App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --primary: #0F6E56;
    --primary-hover: #0a4f3e;
    --danger: #dc2626;
    --danger-hover: #b91c1c;
    --bg-main: #f4f7f6;
    --bg-card: #ffffff;
    --text-main: #1f2937;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --radius: 8px;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  }
  body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 2rem; line-height: 1.5; }
  .container { max-width: 1000px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; position: relative; }
  .header h1 { margin: 0; color: var(--primary); font-size: 2.5rem; letter-spacing: -0.5px; }
  .active-exp-badge { display: inline-block; background: #eef2ff; color: #4f46e5; border: 1px solid #c7d2fe; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-top: 10px; }
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; overflow-x: auto; }
  .tab-btn { background: transparent; border: none; padding: 0.75rem 1.25rem; font-size: 1rem; font-weight: 500; color: var(--text-muted); cursor: pointer; border-radius: var(--radius); transition: all 0.2s; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .tab-btn.active { background: var(--primary); color: white; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.25rem; color: var(--text-muted); }
  input, select { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px; font-family: inherit; }
  button.primary-btn { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 500; border-radius: 4px; cursor: pointer; width: 100%; }
  button.secondary-btn { background: white; color: var(--primary); border: 1px solid var(--primary); padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 500; border-radius: 4px; cursor: pointer; width: 100%; }
  button.danger-btn { background: var(--danger); color: white; border: none; padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 500; border-radius: 4px; cursor: pointer; }
  .table-wrapper { overflow-x: auto; max-height: 300px; border: 1px solid var(--border); border-radius: var(--radius); }
  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Avianlytics</h1>
    <div id="headerActiveExp" class="active-exp-badge"><i class="ti ti-folder"></i> Active: Experiment 1</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('guide')"><i class="ti ti-book"></i> Guide</button>
    <button class="tab-btn" onclick="switchTab('setup')"><i class="ti ti-settings"></i> Trial Setup</button>
    <button class="tab-btn" onclick="switchTab('entry')"><i class="ti ti-pencil"></i> Data Entry</button>
    <button class="tab-btn" onclick="switchTab('dashboard')"><i class="ti ti-layout-dashboard"></i> Dashboard</button>
    <button class="tab-btn" onclick="switchTab('anova')"><i class="ti ti-calculator"></i> ANOVA Analysis</button>
  </div>

  <div id="guide" class="tab-content active card"><h2>Guide</h2>...</div>
  <div id="setup" class="tab-content card">
    <label>Select Experiment</label><select id="expSelectDropdown"></select>
    <input id="newExpNameInput" type="text" placeholder="New Experiment Name">
    <button id="createExpBtn" class="secondary-btn">Create</button>
    <button id="saveConfigBtn" class="primary-btn">Save Configuration</button>
  </div>
  <div id="entry" class="tab-content card">
    <label>Group</label><select id="group"></select>
    </div>
  <div id="dashboard" class="tab-content card">
    <canvas id="bwChart"></canvas>
    <button id="exportBtn" class="primary-btn">Export Active Experiment</button>
  </div>
  <div id="anova" class="tab-content card">...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script>

<script>
  // --- CORE DATA ARCHITECTURE ---
  const STORAGE_KEY = 'avianlytics_workspace_v2';
  let currentExpName = "Experiment 1";
  let experiments = {};
  let NUM_GROUPS = 100, NUM_WEEKS = 6, NUM_TREATMENTS = 4, REPS_PER_TREATMENT = 25;
  let weeklyRecords = [], dailyRecords = [];

  // --- BOOT UP ---
  window.addEventListener('DOMContentLoaded', () => { loadState(); });

  function loadState() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const state = JSON.parse(saved);
      experiments = state.experiments || {};
      currentExpName = state.currentExpName || "Experiment 1";
    }
    loadActiveFromMemory(currentExpName);
    updateExpUI();
  }

  function loadActiveFromMemory(name) {
    currentExpName = name;
    if (!experiments[name]) {
      experiments[name] = { NUM_GROUPS: 100, NUM_WEEKS: 6, NUM_TREATMENTS: 4, REPS_PER_TREATMENT: 25, weeklyRecords: [], dailyRecords: [] };
    }
    const data = experiments[name];
    NUM_GROUPS = data.NUM_GROUPS; NUM_WEEKS = data.NUM_WEEKS;
    NUM_TREATMENTS = data.NUM_TREATMENTS; REPS_PER_TREATMENT = data.REPS_PER_TREATMENT;
    weeklyRecords = data.weeklyRecords; dailyRecords = data.dailyRecords;
    populateAllDropdowns();
  }

  function saveState() {
    experiments[currentExpName] = { NUM_GROUPS, NUM_WEEKS, NUM_TREATMENTS, REPS_PER_TREATMENT, weeklyRecords, dailyRecords };
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ currentExpName, experiments }));
  }

  function populateAllDropdowns() {
    const groupSel = document.getElementById('group');
    const groupSelD = document.getElementById('groupD');
    [groupSel, groupSelD].forEach(sel => {
        if(!sel) return;
        sel.innerHTML = '';
        for(let g=1; g<=NUM_GROUPS; g++){
            let opt = document.createElement('option');
            opt.value = g; opt.textContent = `Group ${g}`;
            sel.appendChild(opt);
        }
    });
  }

  function updateExpUI() {
    document.getElementById('headerActiveExp').innerHTML = `<i class="ti ti-folder"></i> Active: ${currentExpName}`;
    const sel = document.getElementById('expSelectDropdown');
    sel.innerHTML = '';
    Object.keys(experiments).forEach(exp => {
      let opt = document.createElement('option');
      opt.value = exp; opt.textContent = exp;
      if(exp === currentExpName) opt.selected = true;
      sel.appendChild(opt);
    });
    document.getElementById('numGroups').value = NUM_GROUPS;
    document.getElementById('numWeeks').value = NUM_WEEKS;
    document.getElementById('numTreatments').value = NUM_TREATMENTS;
    document.getElementById('numReplicates').value = REPS_PER_TREATMENT;
  }
  
  // (Include previous switchTab, exportBtn, ANOVA logic here)
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker registered!'))
        .catch(err => console.log('SW failed.', err));
    });
  }
</script>
</body>
</html>
